[global/wm]
include-file = ~/src/github.com/catppuccin/polybar/themes/mocha.ini

[bar/main]
background = ${colors.mantle}
enable-ipc = true
font-0 = "UDEV Gothic NF:pixelsize=14;3"
height = 26
locale = ja_JP.UTF-8
padding-left = 1
padding-right = 1
separator = |
separator-foreground = ${colors.surface0}
wm-restack = generic

module-margin = 1
modules-left = date xworkspaces
modules-right = cpu memory filesystem wireless-network wired-network battery tray

[settings]
screenchange-reload = false

compositing-background = source
compositing-border = over
compositing-foreground = over
compositing-overline = over
compositing-underline = over

;; Modules
[module/battery]
type = internal/battery
adapter = AC
battery = BAT1
full-at = 99
poll-interval = 10
time-format = %H:%M

format-discharging-foreground = ${colors.surface2}
label-charging = " BAT: %percentage%% "
label-discharging = " BAT: %percentage%% (%time%) "
label-full = " BAT: Fully Charged "
label-full-foreground = ${colors.surface2}

[module/cpu]
type = internal/cpu
interval = 1

label = " CPU: %percentage%% "
label-foreground = ${colors.surface2}

[module/date]
type = internal/date
date = %Y/%m/%d(%a)
interval = 1
time = %H:%M:%S

format = 󰃰  <label>
format-foreground = ${colors.surface2}
label = "%date% %time%"

[module/filesystem]
type = internal/fs
mount-0 = /

format-mounted-foreground = ${colors.surface2}
label-mounted = " DISK: %used% / %total% "

[module/memory]
type = internal/memory
interval = 5

format-foreground = ${colors.surface2}
label = " RAM: %gb_used% "

[module/tray]
type = internal/tray
tray-background = ${colors.mantle}
tray-maxsize = 24
tray-padding = 8

[module/wired-network]
type = internal/network
interface = enp0s31f6
interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.surface2}
label-connected = " %local_ip% "
label-disconnected = " %ifname% "

[module/wireless-network]
type = internal/network
interface = wlp0s20f3
interval = 5

format-disconnected = <label-disconnected>
label-connected = " %essid%: %local_ip% "
label-connected-foreground = ${colors.surface2}
label-disconnected = " %ifname% "
label-disconnected-foreground = ${colors.surface2}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = false
show-urgent = true

label-active = %name%
label-active-background = ${colors.sapphire}
label-active-foreground = ${colors.mantle}
label-active-padding = 1
label-empty =

label-occupied = %name%
label-occupied-foreground = ${colors.surface2}
label-occupied-padding = 1

label-urgent = %name%
